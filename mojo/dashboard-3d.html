#chat-messages{flex:1;overflow-y:auto;padding:6px 10px;scrollbar-width:thin;scrollbar-color:rgba(57,211,83,0.2) transparent}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(57,211,83,0.2);border-radius:2px}
.chat-msg{margin-bottom:6px;font-size:9px;line-height:1.5;animation:chatFadeIn 0.3s ease}
.chat-msg .chat-time{color:rgba(255,255,255,0.2);margin-right:4px}
.chat-msg .chat-name{font-weight:bold;margin-right:4px}
.chat-msg.agent-cso .chat-name{color:#4a9aff}
.chat-msg.agent-content .chat-name{color:#9a4aff}
.chat-msg.agent-cbo .chat-name{color:#4aff7a}

.chat-msg.agent-cfo .chat-name{color:#ffd700}
.chat-msg.agent-sailing .chat-name{color:#4ad4ff}
.chat-msg.agent-velocity .chat-name{color:#ff4a9a}

.chat-msg.agent-cto .chat-name{color:#ff4a4a}

#tip{position:absolute;background:rgba(4,4,14,0.97);border:1px solid #39d353;border-radius:6px;padding:10px 14px;color:#fff;font-size:10px;pointer-events:none;display:none;line-height:2.1;white-space:nowrap;z-index:20;min-width:200px;box-shadow:0 0 20px rgba(57,211,83,0.2)}
#customizer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,4,14,0.98);border:1px solid #39d353;border-radius:10px;padding:20px;color:#fff;font-size:10px;z-index:30;display:none;min-width:280px;box-shadow:0 0 40px rgba(57,211,83,0.3)}

let camX=0,camY=40;
const ix=(gx,gy)=>(gx-gy)*(TW/2)+CW/2+camX;
const iy=(gx,gy,gz=0)=>(gx+gy)*(TH/2)-gz*TZ+CH/2-100+camY;

// via window.JARVIS_API.updateAgent(id, changes)

// ─── JARVIS API ───────────────────────────────────────────────────
// Agents call this to update their character
window.JARVIS_API = {
  updateAgent(id, changes){
    if(!AGENT_DATA[id])return;
    Object.assign(AGENT_DATA[id], changes);
    const a=agents.find(a=>a.id===id);
    if(a)Object.assign(a,changes);
    logLine(`agent ${id} updated their character`);
  },
  getAgent(id){ return AGENT_DATA[id]; },
  getAllAgents(){ return AGENT_DATA; },
  // Called by dashboard-state.json watcher
  updateFromDashboard(state){
    if(!state||!state.agents)return;
    state.agents.forEach(ag=>{
      if(AGENT_DATA[ag.id]){
        AGENT_DATA[ag.id].status=ag.status||AGENT_DATA[ag.id].status;
        AGENT_DATA[ag.id].score=ag.score||AGENT_DATA[ag.id].score;
        AGENT_DATA[ag.id].lastAction=ag.lastAction||AGENT_DATA[ag.id].lastAction;
      }
    });
  }
};

// CC can call this from terminal:
// fetch('/').then(()=>window.JARVIS_API.updateAgent('15',{body:'#ff6600',mood:'hype'}))
// or agents write to a JSON endpoint

// ─── FLOOR LAYOUT ─────────────────────────────────────────────────
const GRID=14;
const DESKS=[
  {gx:1.0,gy:0.8},{gx:1.0,gy:2.8},{gx:1.0,gy:4.8},{gx:1.0,gy:6.8},
  {gx:4.0,gy:0.8},{gx:4.0,gy:2.8},{gx:4.0,gy:6.8},
  {gx:7.0,gy:0.8},{gx:7.0,gy:2.8},{gx:7.0,gy:4.8},{gx:7.0,gy:6.8},
  {gx:10.0,gy:0.8},{gx:10.0,gy:4.8},{gx:10.0,gy:6.8},
  {gx:4.0,gy:4.8}, // Mojo center desk
];
const PLANTS=[{gx:0,gy:0},{gx:13,gy:0},{gx:0,gy:9},{gx:13,gy:9},{gx:6.5,gy:-0.5},{gx:-0.5,gy:4}];
const SOFAS=[{gx:5.8,gy:11},{gx:8.2,gy:11}];
const WATERCOOLER={gx:13,gy:12};
const COFFEE={gx:0.5,gy:12};

// ─── AGENT INSTANCES ──────────────────────────────────────────────
const IDS=Object.keys(AGENT_DATA);
const agents=IDS.map((id,i)=>{
  const d=AGENT_DATA[id];
  const desk=DESKS[i]||DESKS[i%DESKS.length];
  return{
    id,
    ...JSON.parse(JSON.stringify(d)),
    gx:desk.gx+0.4,gy:desk.gy+0.5,gz:0,

    typT:0,
    socialTarget:null,
    _speed:d.speed==='fast'?0.025:d.speed==='slow'?0.01:0.016,
  };
});

// ─── DRAW UTILS ───────────────────────────────────────────────────
function shade(hex,a){
  const n=parseInt(hex.replace('#',''),16);
  return`#${[n>>16&255,n>>8&255,n&255].map(c=>Math.min(255,Math.max(0,c+a)).toString(16).padStart(2,'0')).join('')}`;
}
function tile(gx,gy,col){
  const x=ix(gx,gy),y=iy(gx,gy);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+TW/2,y+TH/2);
  ctx.lineTo(x,y+TH);ctx.lineTo(x-TW/2,y+TH/2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=0.4;ctx.stroke();
}
function box(gx,gy,gz,bw,bd,bh,cT,cL,cR,a=1){
  if(a<1)ctx.globalAlpha=a;
  const x=ix(gx,gy),y=iy(gx,gy,gz),tw=TW/2,th=TH/2;
  ctx.fillStyle=cT;ctx.beginPath();
  ctx.moveTo(x,y);ctx.lineTo(x+tw*bw,y+th*bw);ctx.lineTo(x+tw*bw-tw*bd,y+th*bw+th*bd);ctx.lineTo(x-tw*bd,y+th*bd);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=cL;ctx.beginPath();
  ctx.moveTo(x-tw*bd,y+th*bd);ctx.lineTo(x+tw*bw-tw*bd,y+th*bw+th*bd);
  ctx.lineTo(x+tw*bw-tw*bd,y+th*bw+th*bd+bh*TZ);ctx.lineTo(x-tw*bd,y+th*bd+bh*TZ);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=cR;ctx.beginPath();
  ctx.moveTo(x+tw*bw-tw*bd,y+th*bw+th*bd);ctx.lineTo(x+tw*bw,y+th*bw);
  ctx.lineTo(x+tw*bw,y+th*bw+bh*TZ);ctx.lineTo(x+tw*bw-tw*bd,y+th*bw+th*bd+bh*TZ);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.4;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+tw*bw,y+th*bw);ctx.lineTo(x+tw*bw-tw*bd,y+th*bw+th*bd);ctx.lineTo(x-tw*bd,y+th*bd);ctx.closePath();ctx.stroke();
  if(a<1)ctx.globalAlpha=1;
}

function drawDesk(gx,gy,active=false){
  const top=active?'#5a4520':'#3e2a14';
  box(gx,gy,0,1.7,1.0,0.5,top,'#241508','#1c1006');
  box(gx+0.15,gy+0.05,0.5,0.55,0.08,0.6,'#111','#001','#002');
  const sx=ix(gx+0.42,gy+0.09),sy=iy(gx+0.42,gy+0.09,0.55);
  ctx.fillStyle=active?'rgba(57,211,83,0.55)':'rgba(20,60,180,0.4)';
  ctx.fillRect(sx-7,sy-9,14,11);
  if(active){for(let r=0;r<4;r++){ctx.fillStyle='rgba(57,211,83,0.35)';ctx.fillRect(sx-5,sy-7+r*2.5,9,1);}}
  box(gx+0.1,gy+0.6,0.5,0.9,0.35,0.05,'#1a1a1a','#111','#161616');
}
function drawPlant(gx,gy){

  const px=ix(gx+0.28,gy+0.28),py=iy(gx+0.28,gy+0.28,0.45);
  [[0,-3,9,'#1a5a1a'],[-4,-7,7,'#2a7a2a'],[4,-6,7,'#155a15'],[-2,-10,5,'#39d353'],[5,-2,5,'#1d6b1d']].forEach(([dx,dy,r,c])=>{
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(px+dx,py+dy,r,0,Math.PI*2);ctx.fill();
  });
}

function drawCatNode(gx,gy,t){
  const x=ix(gx,gy),y=iy(gx,gy,0);
  const p=Math.sin(t*0.035)*5;
  [['rgba(240,192,64,0.12)',28+p],['rgba(240,192,64,0.07)',44+p],['rgba(240,192,64,0.04)',60+p]].forEach(([c,r])=>{
    ctx.strokeStyle=c;ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(x,y+TH/2,r,r/2,0,0,Math.PI*2);ctx.stroke();

  box(gx-0.45,gy-0.45,0,0.9,0.9,0.55,'#f0c040','#b08800','#907000');
  const bx=ix(gx,gy),by=iy(gx,gy,0.55);
  ctx.fillStyle='#f0c040';
  ctx.fillRect(bx-14,by+1,28,6);ctx.fillRect(bx-18,by+5,36,4);
  ctx.fillStyle='#fff';ctx.fillRect(bx-1,by-16,2,17);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.beginPath();ctx.moveTo(bx,by-16);ctx.lineTo(bx+13,by-7);ctx.lineTo(bx,by+1);ctx.fill();
  ctx.fillStyle='rgba(240,192,64,0.08)';
  ctx.beginPath();ctx.ellipse(bx,by+8,35+p*0.5,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0c040';ctx.font='bold 10px Courier New';ctx.textAlign='center';
  ctx.fillText('⚓ ALI KAT',bx,by-23);
  ctx.fillStyle='rgba(240,192,64,0.75)';ctx.font='8px Courier New';
  ctx.fillText('$88K TARGET',bx,by-13);
}

// ─── AGENT DRAWING ────────────────────────────────────────────────
function drawAgent(a,t,pCtx=ctx){
  const sitting=a.behavior==='sitting'||a.behavior==='working';
  const social=a.behavior==='socializing';
  const x=pCtx===ctx?ix(a.gx,a.gy):30;
  const y=pCtx===ctx?iy(a.gx,a.gy,a.gz):65;
  const S=a.id==='15'?5.5:4;
  pCtx.globalAlpha=a.status==='paused'?0.4:1;

  // shadow
  if(pCtx===ctx){
    const sx=ix(a.gx,a.gy),sy=iy(a.gx,a.gy,0)+TH/2;
    pCtx.fillStyle='rgba(0,0,0,0.25)';
    pCtx.beginPath();pCtx.ellipse(sx,sy,sitting?S:S*2,sitting?S*0.5:S,0,0,Math.PI*2);pCtx.fill();
  }

  if(sitting||social){
    pCtx.fillStyle=a.legs;
    pCtx.fillRect(x-S*2,y+S*2,S*2,S*1.8);pCtx.fillRect(x,y+S*2,S*2,S*1.8);
    pCtx.fillStyle=a.body;pCtx.fillRect(x-S*2,y-S,S*4,S*3);
    if(a.behavior==='working'){
      const ty=Math.floor(t/8)%2===0?2:0;
      pCtx.fillStyle=shade(a.body,40);pCtx.fillRect(x-S,y-S*0.3+ty,S,S*0.5);pCtx.fillRect(x+S*0.2,y-S*0.5-ty,S,S*0.5);
    }
  } else {
    const lsw=a.frame<2?S*0.9:-S*0.9;
    pCtx.fillStyle=a.legs;
    pCtx.fillRect(x-S*2,y+S*3,S*2,S*2+lsw);pCtx.fillRect(x,y+S*3,S*2,S*2-lsw);
    pCtx.fillStyle=a.body;pCtx.fillRect(x-S*2,y,S*4,S*3);
    pCtx.fillStyle='rgba(0,0,0,0.15)';pCtx.fillRect(x-S*2,y,S*2,S*3);
    pCtx.fillStyle='rgba(255,255,255,0.08)';pCtx.fillRect(x-S*2,y,S*4,S*0.8);
    const asw=a.frame<2?S*0.6:-S*0.6;
    pCtx.fillStyle=a.body;pCtx.fillRect(x-S*3,y+asw,S,S*2);pCtx.fillRect(x+S*2,y-asw,S,S*2);
  }
  // head block
  pCtx.fillStyle=a.body;pCtx.fillRect(x-S*2,y-S*4,S*4,S*3);
  pCtx.fillStyle='rgba(0,0,0,0.1)';pCtx.fillRect(x-S*2,y-S*4,S*2,S*3);
  pCtx.fillStyle='rgba(255,255,255,0.1)';pCtx.fillRect(x-S*2,y-S*4,S*4,S*0.7);
  // face
  pCtx.fillStyle='rgba(245,203,167,0.92)';pCtx.fillRect(x-S,y-S*3.5,S*2,S*1.8);
  pCtx.fillStyle='#1a1a1a';
  const ex=a.dir>0?x+S*0.15:x-S*0.75;
  pCtx.fillRect(ex,y-S*3.1,S*0.5,S*0.55);
  // mood expression
  if(a.mood==='hype'){pCtx.fillStyle='#ff4';pCtx.fillRect(x-S*0.3,y-S*2,S*0.6,S*0.3);}
  else if(a.mood==='chill'){pCtx.fillStyle='rgba(100,200,255,0.6)';pCtx.fillRect(x-S*0.5,y-S*2,S,S*0.2);}

  // hat
  const hY=y-S*4;
  const hc=a.hat;
  switch(a.hatStyle){
    case 'cap':
      pCtx.fillStyle=hc;pCtx.fillRect(x-S*2.2,hY-S,S*4.4,S);pCtx.fillRect(x-S*1.8,hY-S*2,S*3.6,S);
      pCtx.fillStyle=shade(hc,-25);pCtx.fillRect(x-S*3,hY-S*0.2,S*5,S*0.4);break;
    case 'beret':
      pCtx.fillStyle=hc;pCtx.beginPath();pCtx.ellipse(x-S*0.5,hY-S*1.3,S*3,S*1.6,0,0,Math.PI*2);pCtx.fill();
      pCtx.fillStyle=shade(hc,25);pCtx.beginPath();pCtx.arc(x+S,hY-S*1.6,S*0.4,0,Math.PI*2);pCtx.fill();break;
    case 'top':
      pCtx.fillStyle=hc;pCtx.fillRect(x-S*1.8,hY-S*2.8,S*3.6,S*2.8);
      pCtx.fillStyle=shade(hc,-25);pCtx.fillRect(x-S*2.8,hY-S*0.4,S*5.6,S*0.5);break;
    case 'crown':
      pCtx.fillStyle='#f0c040';pCtx.fillRect(x-S*2,hY-S*1.5,S*4,S*1.5);
      [x-S*1.5,x,x+S*1.5].forEach(cx=>{pCtx.fillRect(cx-S*0.35,hY-S*2.8,S*0.7,S*1.3);});
      ['#ff4444','#4444ff','#44ff44'].forEach((c,i)=>{
        pCtx.fillStyle=c;pCtx.beginPath();pCtx.arc(x+(i-1)*S*1.5,hY-S*2.8,S*0.35,0,Math.PI*2);pCtx.fill();
      });break;
    case 'captain':
      pCtx.fillStyle=hc;pCtx.fillRect(x-S*2.5,hY-S*2.2,S*5,S*2);
      pCtx.fillStyle='#fff';pCtx.fillRect(x-S*3,hY-S*0.5,S*6,S*0.5);
      pCtx.fillStyle='#f0c040';pCtx.beginPath();pCtx.arc(x,hY-S*2.5,S*0.5,0,Math.PI*2);pCtx.fill();break;
    case 'hard':
      pCtx.fillStyle=hc;pCtx.beginPath();pCtx.ellipse(x,hY-S,S*2.8,S*1.3,0,0,Math.PI*2);pCtx.fill();
      pCtx.fillStyle=shade(hc,-30);pCtx.fillRect(x-S*3.2,hY-S*0.3,S*6.4,S*0.4);break;
    case 'grad':
      pCtx.fillStyle=hc;pCtx.fillRect(x-S*2.2,hY-S*1.8,S*4.4,S*1.5);
      pCtx.fillStyle=shade(hc,-20);pCtx.fillRect(x-S*3,hY-S*0.5,S*6,S*0.5);
      pCtx.fillStyle='#f0c040';pCtx.fillRect(x-S*0.2,hY-S*2.2,S*0.4,S*2);pCtx.fillRect(x-S,hY-S*0.4,S*2,S*0.3);break;
    case 'visor':
      pCtx.fillStyle=hc;pCtx.beginPath();pCtx.ellipse(x,hY-S,S*2.8,S*1.1,0,0,Math.PI*2);pCtx.fill();
      pCtx.fillStyle='rgba(0,200,255,0.35)';pCtx.fillRect(x-S*3.2,hY-S*0.4,S*6.4,S*0.45);break;
    case 'beanie':
      pCtx.fillStyle=hc;pCtx.beginPath();pCtx.ellipse(x,hY-S*1.5,S*2.4,S*2.1,0,0,Math.PI);pCtx.fill();
      pCtx.fillStyle=shade(hc,-20);pCtx.fillRect(x-S*2.4,hY-S*0.5,S*4.8,S*0.6);
      pCtx.fillStyle=shade(hc,30);pCtx.beginPath();pCtx.arc(x,hY-S*3,S*0.5,0,Math.PI*2);pCtx.fill();break;
    case 'snapback':
      pCtx.fillStyle=hc;pCtx.fillRect(x-S*2,hY-S*2,S*4,S*1.8);
      pCtx.fillStyle=shade(hc,-25);pCtx.fillRect(x-S*3,hY-S*0.5,S*5,S*0.5);
      pCtx.fillStyle='rgba(255,255,255,0.2)';pCtx.fillRect(x-S*0.5,hY-S*2,S,S*0.25);break;
  }

  // status dot + ring
  const dotC=a.status==='active'?'#39d353':a.status==='degraded'?'#f0c040':'#445';
  const dotY=sitting?y-S*6:y-S*5.2;
  pCtx.fillStyle=dotC;pCtx.globalAlpha=1;
  pCtx.beginPath();pCtx.arc(x,dotY,S*0.7,0,Math.PI*2);pCtx.fill();
  if(a.status==='active'&&pCtx===ctx){
    pCtx.strokeStyle=dotC;pCtx.lineWidth=0.5;
    pCtx.globalAlpha=0.25+Math.sin(t*0.09+a.bobOff)*0.15;
    pCtx.beginPath();pCtx.arc(x,dotY,S*1.8,0,Math.PI*2);pCtx.stroke();
    pCtx.globalAlpha=1;
  }

  // name tag
  const tagY=sitting?y-S*8:y-S*7;
  pCtx.font=`bold ${a.id==='15'?10:9}px Courier New`;
  const tw=pCtx.measureText(a.name).width;
  pCtx.fillStyle='rgba(4,4,14,0.9)';pCtx.fillRect(x-tw/2-5,tagY-12,tw+10,13);
  pCtx.strokeStyle=a.status==='degraded'?'#f0c040':dotC;pCtx.lineWidth=0.8;
  pCtx.strokeRect(x-tw/2-5,tagY-12,tw+10,13);
  pCtx.fillStyle=a.status==='paused'?'#888':'#fff';
  pCtx.textAlign='center';pCtx.fillText(a.name,x,tagY-1);
  pCtx.globalAlpha=1;
}

function drawBubble(a){
  if(!a.bubble||a.bub_t<=0)return;
  const sitting=a.behavior==='sitting'||a.behavior==='working';
  const S=a.id==='15'?5.5:4;
  const x=ix(a.gx,a.gy),y=iy(a.gx,a.gy,a.gz)-(sitting?S*12:S*11);
  const fade=Math.min(1,a.bub_t/20);
  ctx.globalAlpha=fade;
  ctx.font='8px Courier New';
  const tw=ctx.measureText(a.bubble).width;
  const bx=x-tw/2-7,by=y-14,bw=tw+14,bh=16;
  ctx.fillStyle='rgba(4,4,14,0.96)';
  ctx.strokeStyle='rgba(57,211,83,0.8)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.rect(bx,by,bw,bh);ctx.fill();ctx.stroke();
  // tail
  ctx.fillStyle='rgba(4,4,14,0.96)';ctx.beginPath();ctx.moveTo(x-5,by+bh);ctx.lineTo(x+5,by+bh);ctx.lineTo(x,by+bh+6);ctx.fill();
  ctx.strokeStyle='rgba(57,211,83,0.5)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x-5,by+bh);ctx.lineTo(x,by+bh+6);ctx.lineTo(x+5,by+bh);ctx.stroke();
  ctx.fillStyle='#39d353';ctx.textAlign='left';ctx.fillText(a.bubble,bx+7,by+11);
  ctx.globalAlpha=1;
}

// ─── BEHAVIOR ENGINE ──────────────────────────────────────────────
const WANDER_SPOTS=[
  {x:6.5,y:5.5,label:'ali kat'},  // goal node
  {x:12.5,y:8.5,label:'cooler'},  // water cooler
  {x:0,y:8.5,label:'coffee'},     // coffee maker
  {x:6,y:8.5,label:'sofa'},       // sofa
  {x:8,y:8.5,label:'sofa'},
];

// ─── REAL ACTIVITY STATE (fetched from API) ──────────────────────
let _liveData = {characters:{}, active_convos:[], performance:{}};
let _liveDataAge = 0;

// Agent ID → desk index mapping for "walk to agent X's desk"
const AGENT_DESK_MAP = {};
agents.forEach(function(ag, idx) { AGENT_DESK_MAP[ag.id] = idx; });

// Map agent-core IDs to HQ IDs
const CORE_TO_HQ = {
  'agent1_cso':'01','agent2_content':'02','agent3_cbo':'03',
  'agent4_sysadmin':'04','agent5_cfo':'05','agent6_sailing':'06',
  'agent7_law':'07','agent8_academic':'08','agent9_cto':'09',
  'agent10_nerve':'10','agent11_jobs':'11','agent12_freelance':'12',
  'agent13_coo':'13','agent14_velocity':'14','cc_jarvis':'15'
};

function getAgentDesk(coreId) {
  var hqId = CORE_TO_HQ[coreId];
  if (!hqId) return null;
  var idx = AGENT_DESK_MAP[hqId];
  if (idx === undefined || !DESKS[idx]) return null;
  return DESKS[idx];
}

function updateAgent(a,t){
  a.bTimer--;

  // bubble decay
  if(a.bub_t>0)a.bub_t--;

  if(a.bTimer<=0){
    var r=Math.random();
    var sp=a._speed||(a.speed==='fast'?0.025:a.speed==='slow'?0.01:0.016);
    a._speed=sp;

    // ─── READ REAL DATA to drive behavior ───
    var charData = _liveData.characters[a.id] || {};
    var realMood = charData.mood || a.mood || 'working';
    var realAction = charData.lastAction || '';

    // Check if this agent is in an active conversation
    var talkingTo = null;
    _liveData.active_convos.forEach(function(c) {
      var fromHQ = CORE_TO_HQ[c.from];
      var toHQ = CORE_TO_HQ[c.to];
      if (fromHQ === a.id) talkingTo = toHQ;
    });

    // Update bubbles from real action
    if (realAction && Math.random() < 0.4) {
      a.bubble = realAction.substring(0, 35);
      a.bub_t = 150;
    }

    // ─── BEHAVIOR DRIVEN BY REAL STATE ───

    if(a.status==='paused'){
      // Paused: sit at desk, don't move
      a.behavior='sitting'; a.bTimer=500+Math.random()*400;
      a.gx=a.deskX+0.4; a.gy=a.deskY+0.5;

    } else if(talkingTo){
      // REAL: walking to another agent's desk (active conversation)
      var targetDesk = getAgentDesk(
        Object.keys(CORE_TO_HQ).find(function(k){return CORE_TO_HQ[k]===talkingTo;})
      );
      if(targetDesk){
        a.behavior='walking';
        a.targetX=targetDesk.gx+0.4; a.targetY=targetDesk.gy+0.5;
        a.goHome=false;
        a.bTimer=80+Math.random()*60;
        // Show conversation bubble
        var convo = _liveData.active_convos.find(function(c){return CORE_TO_HQ[c.from]===a.id;});
        if(convo){
          a.bubble='-> ' + (AGENT_DATA[talkingTo]||{}).name + ': ' + convo.msg.substring(0,25);
          a.bub_t=120;
        }
      } else {
        a.behavior='working'; a.bTimer=100;
      }

    } else if(realMood==='hype'){
      // REAL: alerting — jump up and down (handled in draw with bounce)
      if(a.behavior!=='walking'){
        a.behavior='working'; a.bTimer=40+Math.random()*30;
        // Small random jumps near desk
        if(r<0.3){
          a.behavior='walking';
          a.targetX=a.deskX+(Math.random()-0.5)*1.5;
          a.targetY=a.deskY+(Math.random()-0.5)*1.5;
          a.goHome=false; a.bTimer=30;
        }
      } else {
        a.targetX=a.deskX+0.4; a.targetY=a.deskY+0.5;
        a.goHome=true; a.bTimer=40;
      }

    } else if(realMood==='working' || realMood==='focused'){
      // REAL: working at desk — mostly seated, but gets up occasionally
      if(a.behavior==='walking' && a.goHome){
        a.bTimer=30;
      } else if(r<0.15){
        // 15% chance to get up for a stretch/coffee/water
        a.behavior='walking';
        var spot=WANDER_SPOTS[Math.floor(Math.random()*WANDER_SPOTS.length)];
        a.targetX=spot.x+(Math.random()-0.5)*1;
        a.targetY=spot.y+(Math.random()-0.5)*1;
        a.goHome=false; a.bTimer=60+Math.random()*80;
      } else if(r<0.25){
        // 10% chance to walk to a nearby agent's desk
        var nearbyIdx=Math.floor(Math.random()*DESKS.length);
        if(DESKS[nearbyIdx]){
          a.behavior='walking';
          a.targetX=DESKS[nearbyIdx].gx+0.4; a.targetY=DESKS[nearbyIdx].gy+0.5;
          a.goHome=false; a.bTimer=50+Math.random()*60;
        }
      } else {
        var atDesk1=Math.abs(a.gx-(a.deskX+0.4))<0.5&&Math.abs(a.gy-(a.deskY+0.5))<0.5;
        if(atDesk1){a.behavior=r<0.3?'idle':'working';a.bTimer=150+Math.random()*250;}
        else{a.behavior='walking';a.targetX=a.deskX+0.4;a.targetY=a.deskY+0.5;a.goHome=true;a.bTimer=40;}
      }

    } else if(realMood==='chill'){
      // REAL: idle/monitoring — wanders frequently
      if(r<0.45){
        a.behavior='walking';
        var spot=WANDER_SPOTS[Math.floor(Math.random()*WANDER_SPOTS.length)];
        a.targetX=spot.x+(Math.random()-0.5)*1.5;
        a.targetY=spot.y+(Math.random()-0.5)*1.5;
        a.goHome=false; a.bTimer=80+Math.random()*120;
      } else if(r<0.6){
        // Visit another agent
        var visitIdx=Math.floor(Math.random()*DESKS.length);
        if(DESKS[visitIdx]){
          a.behavior='walking';
          a.targetX=DESKS[visitIdx].gx+(Math.random()-0.5); a.targetY=DESKS[visitIdx].gy+0.5;
          a.goHome=false; a.bTimer=60+Math.random()*80;
        }
      } else {
        var atDesk2=Math.abs(a.gx-(a.deskX+0.4))<0.5&&Math.abs(a.gy-(a.deskY+0.5))<0.5;
        if(atDesk2){a.behavior='sitting';a.bTimer=120+Math.random()*150;}
        else{a.behavior='walking';a.targetX=a.deskX+0.4;a.targetY=a.deskY+0.5;a.goHome=true;a.bTimer=40;}
      }

    } else {
      // Fallback: standard behavior
      if(a.behavior==='sitting'||a.behavior==='working'){
        if(r<0.35){
          a.behavior='walking';
          var d=1.5+Math.random()*2.5;
          var angle=Math.random()*Math.PI*2;
          a.targetX=Math.max(0.5,Math.min(12.5,a.deskX+Math.cos(angle)*d));
          a.targetY=Math.max(0.5,Math.min(12.5,a.deskY+Math.sin(angle)*d));
          a.goHome=false; a.bTimer=60+Math.random()*140;
        } else {
          a.behavior=r<0.2?'idle':'working';
          a.bTimer=150+Math.random()*350;
        }
      } else if(a.behavior==='walking'){
        a.targetX=a.deskX+0.4; a.targetY=a.deskY+0.5;
        a.goHome=true; a.bTimer=60+Math.random()*100;
      } else {
        a.behavior='working'; a.bTimer=100+Math.random()*200;
      }
    }
  }

  // movement
  if((a.behavior==='walking')&&a.targetX!==null){
    const dx=a.targetX-a.gx,dy=a.targetY-a.gy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const sp=a._speed||0.016;
    if(dist>0.12){
      a.vx=dx/dist*sp;a.vy=dy/dist*sp;
      if(a.vx>0.005)a.dir=1;else if(a.vx<-0.005)a.dir=-1;
      a.ft++;if(a.ft>12){a.frame=(a.frame+1)%4;a.ft=0;}
    } else {
      a.vx=0;a.vy=0;a.frame=0;
      if(a.goHome){a.behavior='working';a.bTimer=200+Math.random()*400;a.goHome=false;}
      else{a.behavior='idle';a.bTimer=40+Math.random()*80;}
    }
    a.gx=Math.max(0.3,Math.min(12.8,a.gx+a.vx));
    a.gy=Math.max(0.3,Math.min(12.8,a.gy+a.vy));
  } else {
    a.vx*=0.85;a.vy*=0.85;
    if(a.behavior==='idle'){
      a.lookT--;
      if(a.lookT<=0){a.dir*=-1;a.lookT=25+Math.random()*50;}
    }
    a.frame=0;
  }

  // gentle float
  a.gz=Math.sin(t*0.035+a.bobOff)*0.04;

  // social magnet — agents gravitate toward Mojo occasionally
  if(a.id!=='15'&&Math.random()<0.0005&&a.behavior==='walking'){
    const mojo=agents.find(m=>m.id==='15');
    if(mojo){a.targetX=mojo.gx+(Math.random()-0.5);a.targetY=mojo.gy+(Math.random()-0.5);a.behavior='socializing';}
  }

  // random bubble while walking
  if(a.behavior==='walking'&&Math.random()<0.004&&a.bub_t<=0){
    a.bubble=a.bubbles[Math.floor(Math.random()*a.bubbles.length)];
    a.bub_t=100;
  }
}

function renderPreview(){
  if(!custAgent)return;
  pctx.clearRect(0,0,60,80);
  pctx.fillStyle='#0a0a1f';pctx.fillRect(0,0,60,80);
  const preview={
    ...custAgent,
    body:document.getElementById('c-body').value,
    legs:document.getElementById('c-legs').value,
    hat:document.getElementById('c-hat').value,
    hatStyle:document.getElementById('c-hatstyle').value,
    mood:document.getElementById('c-mood').value,
    behavior:'idle',dir:1,frame:0,gx:0,gy:0,gz:0,bub_t:0,bubble:'',status:'active'
  };
  // draw preview centered
  const ox=ix,oy=iy;
  // temporarily override iso for preview
  const px=30,py=65;
  pctx.save();
  // draw simplified preview
  const S=4;
  const hc=preview.hat;
  pctx.fillStyle=preview.legs;pctx.fillRect(px-S*2,py+S*3,S*2,S*2);pctx.fillRect(px,py+S*3,S*2,S*2);
  pctx.fillStyle=preview.body;pctx.fillRect(px-S*2,py,S*4,S*3);pctx.fillRect(px-S*2,py-S*3,S*4,S*3);
  pctx.fillStyle='rgba(245,203,167,0.9)';pctx.fillRect(px-S,py-S*2.5,S*2,S*1.5);
  pctx.fillStyle='#1a1a1a';pctx.fillRect(px+S*0.2,py-S*2.1,S*0.5,S*0.5);
  const hY=py-S*3;
  drawHatPreview(pctx,px,hY,S,preview.hatStyle,hc);
  pctx.fillStyle='#39d353';pctx.beginPath();pctx.arc(px,hY-S*2,S*0.6,0,Math.PI*2);pctx.fill();
  pctx.restore();
}

function drawHatPreview(c,x,y,S,style,hc){
  switch(style){
    case 'cap':c.fillStyle=hc;c.fillRect(x-S*2,y-S,S*4,S);c.fillRect(x-S*1.5,y-S*2,S*3,S);break;
    case 'beret':c.fillStyle=hc;c.beginPath();c.ellipse(x-S*0.3,y-S*1.2,S*2.8,S*1.5,0,0,Math.PI*2);c.fill();break;
    case 'top':c.fillStyle=hc;c.fillRect(x-S*1.6,y-S*2.6,S*3.2,S*2.6);c.fillStyle=shade(hc,-20);c.fillRect(x-S*2.5,y-S*0.4,S*5,S*0.4);break;
    case 'crown':c.fillStyle='#f0c040';c.fillRect(x-S*1.8,y-S*1.5,S*3.6,S*1.5);[x-S*1.2,x,x+S*1.2].forEach(cx=>{c.fillRect(cx-S*0.3,y-S*2.6,S*0.6,S*1.1);});break;
    case 'captain':c.fillStyle=hc;c.fillRect(x-S*2.2,y-S*2,S*4.4,S*1.8);c.fillStyle='#fff';c.fillRect(x-S*2.8,y-S*0.5,S*5.6,S*0.4);break;
    case 'beanie':c.fillStyle=hc;c.beginPath();c.ellipse(x,y-S*1.5,S*2.2,S*2,0,0,Math.PI);c.fill();c.fillRect(x-S*2.2,y-S*0.5,S*4.4,S*0.5);break;
    default:break;
  }
}

let t=0;
function loop(){
  requestAnimationFrame(loop);
  t++;
  ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,CW,CH);
  // Star field particles
  if(!window._stars){
    window._stars=[];
    for(var si=0;si<80;si++) window._stars.push({x:Math.random()*CW,y:Math.random()*CH,s:Math.random()*1.5+0.3,b:Math.random()});
  }
  window._stars.forEach(function(st){

    ctx.fillStyle='rgba(180,200,255,'+alpha+')';
    ctx.fillRect(st.x,st.y,st.s,st.s);
  });

  // floor tiles
  for(let gy=0;gy<GRID;gy++){
    for(let gx=0;gx<GRID;gx++){
      const carpet=gx>=4&&gx<=10&&gy>=3&&gy<=9;
      const c=carpet?((gx+gy)%2===0?'#3a3a42':'#333340'):((gx+gy)%2===0?'#2a2a35':'#252530');
      tile(gx,gy,c);

  }

  // back walls
  for(let i=0;i<GRID;i++){

    box(0,i,0,0.15,1,2,'#18183a','#0c0c1e','#121230');

  drawWaterCooler(WATERCOOLER.gx,WATERCOOLER.gy);
  drawCoffeeMaker(COFFEE.gx,COFFEE.gy);

  // desks — glow when agent is working
  DESKS.forEach((d,i)=>{
    const a=agents[i];
    const active=a&&(a.behavior==='working')&&Math.abs(a.gx-d.gx)<1.2&&Math.abs(a.gy-d.gy)<1.2;
    drawDesk(d.gx,d.gy,active);
  });

  // ali kat node
  drawCatNode(12,1,t);

  // update + sort agents by iso depth
  agents.forEach(a=>updateAgent(a,t));
  [...agents].sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy)).forEach(a=>{
    drawBubble(a);drawAgent(a,t);
  });

  // scanline + vignette
  ctx.fillStyle='rgba(0,0,0,0.018)';
  for(let sy=0;sy<CH;sy+=3)ctx.fillRect(0,sy,CW,1);
  const vg=ctx.createRadialGradient(CW/2,CH/2,CH*0.3,CW/2,CH/2,CH*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,18,0.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
}

const AGENT_KEY_MAP = {
  'agent1_cso':'01', 'agent1_mission_control':'01', 'security':'01',
  'agent2_content':'02', 'content_empire':'02',
  'agent3_cbo':'03',
  'agent4_sysbiz':'04', 'agent4_sysadmin':'04',

async function fetchAndSync() {
  try {
    const resp = await fetch(API + '/api/hq/agents');
    if (!resp.ok) return;
    const agents = await resp.json();
    let active = 0, degraded = 0, paused = 0;

    Object.entries(agents).forEach(function(entry) {
      const key = entry[0];
      const a = entry[1];
      const hqId = AGENT_KEY_MAP[key];

      // Update status counts
      if (typeof a === 'object') {
        if (a.status === 'active' || a.status === 'healthy') active++;
        else if (a.status === 'paused') paused++;
        else degraded++;
      }

      // Sync to 3D agent character
      if (hqId && AGENT_DATA[hqId]) {
        const prev = AGENT_DATA[hqId].status;
        AGENT_DATA[hqId].status = a.status || 'unknown';
        AGENT_DATA[hqId].lastAction = a.last_action || AGENT_DATA[hqId].lastAction;

        // Status change = agent reacts
        if (prev !== AGENT_DATA[hqId].status) {
          if (a.status === 'active') {
            AGENT_DATA[hqId].mood = 'working';
            addChat('agent-system', AGENT_DATA[hqId].name, 'back online', '');
          } else if (a.status === 'degraded') {
            AGENT_DATA[hqId].mood = 'focused';
            addChat('agent-system', AGENT_DATA[hqId].name, 'degraded — investigating', 'critical');
          }
        }

        // Sync to walking agent instance
        const inst = window._agentInstances && window._agentInstances.find(function(x){return x.id===hqId;});
        if (inst) {
          inst.status = AGENT_DATA[hqId].status;
        }
      }
    });

    document.getElementById('h-a').textContent = active;
    document.getElementById('h-d').textContent = degraded;
    document.getElementById('h-p').textContent = paused;
  } catch(e) {}
}

      // Sync character appearance from real data

          if (data.lastAction) AGENT_DATA[hqId].lastAction = data.lastAction;
        }
      });
    }
  } catch(e) {}
}
