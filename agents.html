<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Jarvis — Agent Floor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04020c;color:#e0d8ff;font-family:'Courier New',monospace;display:flex;height:100vh;overflow:hidden;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;}
/* HUD panels */
.panel{
  position:absolute;background:rgba(4,2,14,0.92);
  border:1px solid #3b1280;border-radius:6px;
  pointer-events:none;
  box-shadow:0 0 18px rgba(100,40,200,0.25),inset 0 0 30px rgba(80,20,160,0.04);
}
#hud-main{top:12px;left:12px;padding:10px 14px;min-width:180px;}
#hud-main .title{font-size:14px;color:#c4b5fd;font-weight:bold;letter-spacing:2px;}
#hud-main .sub{font-size:8px;color:#4c1d95;letter-spacing:2px;margin-top:1px;}
#hud-main .clock{font-size:11px;color:#7c6fad;margin-top:6px;font-variant-numeric:tabular-nums;}
#hud-stats{top:12px;left:205px;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;}
.stat-row{font-size:9px;}
.stat-label{color:#3b1280;}
.stat-val{color:#a78bfa;font-weight:bold;}
#hud-alert{top:12px;left:430px;padding:8px 12px;min-width:160px;border-color:#f472b690;}
#hud-alert .al-title{font-size:8px;color:#f472b6;letter-spacing:2px;margin-bottom:5px;}
.al-item{font-size:9px;color:#9880cc;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.al-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
#hud-graph{bottom:12px;left:12px;padding:8px 10px;width:220px;}
#hud-graph .g-title{font-size:8px;color:#4c1d95;letter-spacing:1px;margin-bottom:5px;}
#graph-canvas{display:block;}
#minimap-panel{bottom:12px;left:244px;padding:8px 10px;}
#minimap-panel .mm-title{font-size:8px;color:#4c1d95;letter-spacing:1px;margin-bottom:4px;}
#mm{display:block;border-radius:2px;}
/* Tooltip */
#tooltip{
  position:absolute;background:rgba(6,3,20,0.97);border:1px solid #7c3aed;
  border-radius:7px;padding:8px 13px;font-size:11px;color:#ddd6fe;
  pointer-events:none;display:none;z-index:20;
  box-shadow:0 0 20px rgba(124,58,237,0.5);
}
#tooltip .t-name{font-weight:bold;color:#a78bfa;font-size:13px;}
#tooltip .t-role{color:#4c1d95;font-size:10px;margin-top:1px;}
#tooltip .t-beh{color:#6ee7b7;font-size:10px;margin-top:3px;}
/* Right panel */
#right-panel{width:275px;background:rgba(3,1,12,0.98);border-left:1px solid #1e0860;display:flex;flex-direction:column;}
#rp-header{padding:11px 13px 8px;border-bottom:1px solid #1e0860;display:flex;align-items:center;gap:7px;}
#rp-header h3{font-size:10px;color:#6d28d9;letter-spacing:2px;text-transform:uppercase;}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:pd 1.4s infinite;}
@keyframes pd{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.5);}}
#feed-list{flex:1;overflow-y:auto;padding:7px 9px;}
#feed-list::-webkit-scrollbar{width:3px;}
#feed-list::-webkit-scrollbar-thumb{background:#2d1260;}
.fi{margin-bottom:8px;font-size:10px;line-height:1.5;padding:5px 8px;border-radius:4px;background:rgba(60,20,130,0.07);border-left:2px solid #2d1260;animation:fi-in 0.3s ease;}
@keyframes fi-in{from{opacity:0;transform:translateX(8px);}to{opacity:1;}}
.fi .fts{float:right;color:#2d1260;font-size:8px;}
.fi .fw{font-weight:bold;}
.fi .ft{color:#7a6aa0;}
#metrics-grid{border-top:1px solid #1e0860;padding:8px 9px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.mc{background:rgba(40,15,90,0.2);border:1px solid #1e0860;border-radius:4px;padding:5px 0;text-align:center;}
.mc .mv{font-size:14px;color:#c4b5fd;font-weight:bold;line-height:1;}
.mc .ml{font-size:7px;color:#3b1280;letter-spacing:0.5px;margin-top:2px;}
#agent-list{border-top:1px solid #1e0860;overflow-y:auto;max-height:165px;padding:6px 9px;}
#agent-list::-webkit-scrollbar{width:3px;}
#agent-list::-webkit-scrollbar-thumb{background:#2d1260;}
.ar{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:9px;}
.ar .ad{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ar .an{color:#a78bfa;font-weight:bold;min-width:78px;}
.ar .ab{margin-left:auto;font-size:7.5px;letter-spacing:0.3px;}
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <!-- HUD panels -->
  <div class="panel" id="hud-main">
    <div class="title">CC JARVIS HQ</div>
    <div class="sub">AUTONOMOUS OPS PLATFORM v4.1</div>
    <div class="clock" id="clock">--:-- --</div>
  </div>
  <div class="panel" id="hud-stats">
    <div class="stat-row"><span class="stat-label">AGENTS </span><span class="stat-val">15</span></div>
    <div class="stat-row"><span class="stat-label">MSGS </span><span class="stat-val" id="sv-msgs">0</span></div>
    <div class="stat-row"><span class="stat-label">ACTIVE </span><span class="stat-val" id="sv-active">0</span></div>
    <div class="stat-row"><span class="stat-label">UPTIME </span><span class="stat-val" id="sv-up">00:00</span></div>
    <div class="stat-row"><span class="stat-label">BEAMS </span><span class="stat-val" id="sv-beams">0</span></div>
    <div class="stat-row"><span class="stat-label">TASKS </span><span class="stat-val" id="sv-tasks">0</span></div>
  </div>
  <div class="panel" id="hud-alert">
    <div class="al-title">&#9670; SYSTEM STATUS</div>
    <div class="al-item"><div class="al-dot" style="background:#4ade80"></div><span id="al1">Pipeline: NOMINAL</span></div>
    <div class="al-item"><div class="al-dot" style="background:#60a5fa"></div><span id="al2">Memory: SYNCED</span></div>
    <div class="al-item"><div class="al-dot" style="background:#f472b6"></div><span id="al3">Security: CLEAR</span></div>
    <div class="al-item"><div class="al-dot" style="background:#fde047"></div><span id="al4">LLM Router: ONLINE</span></div>
  </div>
  <div class="panel" id="hud-graph">
    <div class="g-title">&#9670; MSG ACTIVITY (60s)</div>
    <canvas id="graph-canvas" width="200" height="50"></canvas>
  </div>
  <div class="panel" id="minimap-panel">
    <div class="mm-title">&#9670; FLOOR MAP</div>
    <canvas id="mm" width="110" height="110"></canvas>
  </div>
  <div id="tooltip">
    <div class="t-name" id="tt-n"></div>
    <div class="t-role" id="tt-r"></div>
    <div class="t-beh" id="tt-b"></div>
  </div>
</div>
<div id="right-panel">
  <div id="rp-header"><div class="pulse-dot"></div><h3>Agent Comms Feed</h3></div>
  <div id="feed-list"></div>
  <div id="metrics-grid">
    <div class="mc"><div class="mv" id="m0">0</div><div class="ml">MSGS</div></div>
    <div class="mc"><div class="mv" id="m1">0</div><div class="ml">MEETS</div></div>
    <div class="mc"><div class="mv" id="m2">0</div><div class="ml">BREWS</div></div>
    <div class="mc"><div class="mv" id="m3">0</div><div class="ml">TASKS</div></div>
  </div>
  <div id="agent-list"></div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────
var DEFS=[
  {name:"Jarvis",       role:"Orchestrator",   color:"#c4b5fd",hat:"crown",  spd:0.004},
  {name:"Nerve Center", role:"Infrastructure", color:"#60a5fa",hat:"hard",   spd:0.005},
  {name:"Navigator",    role:"Content Lead",   color:"#34d399",hat:"cap",    spd:0.006},
  {name:"Gemini",       role:"LLM Router",     color:"#fde047",hat:"none",   spd:0.006},
  {name:"Outreach",     role:"Email Pipeline", color:"#f87171",hat:"fedora", spd:0.005},
  {name:"CFO",          role:"Finance",        color:"#4ade80",hat:"bowler", spd:0.004},
  {name:"Sysadmin",     role:"Sys Health",     color:"#38bdf8",hat:"hard",   spd:0.006},
  {name:"Lawbringer",   role:"Compliance",     color:"#e879f9",hat:"top",    spd:0.003},
  {name:"Lookout",      role:"Watchdog",       color:"#facc15",hat:"cap",    spd:0.007},
  {name:"Quartermaster",role:"Resources",      color:"#fb923c",hat:"none",   spd:0.004},
  {name:"Job Scout",    role:"Job Search",     color:"#818cf8",hat:"fedora", spd:0.005},
  {name:"Freelancer",   role:"Proposals",      color:"#2dd4bf",hat:"cap",    spd:0.005},
  {name:"Archivist",    role:"Memory",         color:"#c084fc",hat:"bowler", spd:0.003},
  {name:"Velocity",     role:"Lead Scoring",   color:"#f472b6",hat:"none",   spd:0.006},
  {name:"Sentinel",     role:"Security Ops",   color:"#94a3b8",hat:"hard",   spd:0.004},
];
var MSGS=[
  ["","","Got a sec?"],
  ["","","Almost done with this"],
  ["","","Can you review this?"],
  ["","","Quick sync?"],
  ["","","Meeting in 5"],
  ["","","On a call, one sec"],
  ["","","Coffee run?"],
  ["","","This looks off to me"],
  ["","","You free?"],
  ["","","Check the queue"],
  ["","","Just pushed that fix"],
  ["","","Need your eyes on this"],
  ["","","Done ✓"],
  ["","","Running a bit behind"],
  ["","","Blocked on this one"],
  ["","","Who owns this?"],
  ["","","Ping me when done"],
  ["","","On it"],
  ["","","Looks good to me"],
  ["","","One sec..."],
  ["","","Anything urgent?"],
  ["","","Queue's clear"],
  ["","","Just deployed"],
  ["","","Need that EOD"],
  ["","","Heads up"],
  ["","","BRB"],
  ["","","Back in 5"],
  ["","","Can we push this?"],
  ["","","Taking my lunch"],
  ["","","Did you see the new report?"],
  ["","","That's on me, sorry"],
  ["","","Slack me the link"],
  ["","","Approved ✓"],
  ["","","Have a minute?"],
  ["","","Just checking in"],
  ["","","Let me know when you're free"],
  ["","","Can you hop on a call?"],
  ["","","Two secs"],
  ["","","Running the numbers now"],
  ["","","Flag it if it breaks"],
];

// ─── Layout ─────────────────────────────────────────────────────
var TW=64,TH=32,TZ=22,COLS=18,ROWS=18;
function isoX(gx,gy){return(gx-gy)*(TW/2);}
function isoY(gx,gy){return(gx+gy)*(TH/2);}

var DESKS=[
  {x:2,y:2},{x:4,y:2},{x:6,y:2},{x:8,y:2},{x:10,y:2},
  {x:2,y:5},{x:4,y:5},{x:6,y:5},{x:8,y:5},{x:10,y:5},
  {x:2,y:8},{x:4,y:8},{x:6,y:8},{x:8,y:8},{x:10,y:8},
];
var SERVER={x:16,y:1},WATER={x:15,y:4},COFFEE={x:15,y:7};
var MEETING={x:13,y:11},SOFAS=[{x:12,y:14},{x:14,y:14}];
var PLANTS=[{x:1,y:1},{x:1,y:16},{x:16,y:16},{x:16,y:11}];
var WHITEBOARD={x:1,y:9},PRINTER={x:1,y:12};

var BLOCKED=new Set();
[].concat(DESKS,[SERVER,WATER,COFFEE,MEETING],SOFAS,PLANTS,[WHITEBOARD,PRINTER]).forEach(function(f){BLOCKED.add(f.x+','+f.y);});
for(var mbx=-1;mbx<=1;mbx++)for(var mby=0;mby<=2;mby++)BLOCKED.add((MEETING.x+mbx)+','+(MEETING.y+mby));

function walkable(x,y){return x>=1&&x<COLS-1&&y>=1&&y<ROWS-1&&!BLOCKED.has(x+','+y);}
function rw(){var x,y,t=0;do{x=1+Math.floor(Math.random()*(COLS-2));y=1+Math.floor(Math.random()*(ROWS-2));t++;}while(!walkable(x,y)&&t<300);return{x:x,y:y};}

// ─── State ──────────────────────────────────────────────────────
var totalMsgs=0,totalMeets=0,totalBrews=0,totalTasks=0,totalBeams=0;
var startTime=Date.now();
var msgHistory=new Array(60).fill(0); // per-second msg count for graph
var lastMsgSec=-1;

// Beams, bubbles, particles, explosions
var beams=[],bubbles=[],explosions=[];

// Floor data streams (flowing lines along grid edges)
var streams=[];
(function(){
  // Horizontal streams
  for(var sy2=2;sy2<ROWS-1;sy2+=3){
    streams.push({axis:'h',row:sy2,pos:0,speed:0.04+Math.random()*0.04,color:['#7c3aed','#3b82f6','#f472b6','#34d399'][Math.floor(Math.random()*4)],len:2+Math.random()*3});
  }
  // Vertical streams
  for(var sx2=2;sx2<COLS-1;sx2+=3){
    streams.push({axis:'v',col:sx2,pos:0,speed:0.03+Math.random()*0.04,color:['#4c1d95','#1d4ed8','#9333ea','#14b8a6'][Math.floor(Math.random()*4)],len:2+Math.random()*3});
  }
})();

// Network lines (persistent dim connections between paired agents)
var NET_PAIRS=[
  [0,1],[0,4],[0,5],[0,14],[1,14],[4,13],[2,3],[5,9],[6,1],[7,0],[8,14],[10,11],[12,3],[13,4]
];

// Holographic panels above specific desks
var HOLOS=[
  {deskIdx:0,type:'bars',label:'PIPELINE',data:[]},
  {deskIdx:2,type:'line',label:'CONTENT',data:[]},
  {deskIdx:5,type:'bars',label:'FINANCE',data:[]},
  {deskIdx:7,type:'line',label:'SECURITY',data:[]},
  {deskIdx:10,type:'pie',label:'TASKS',data:[]},
  {deskIdx:12,type:'bars',label:'MEMORY',data:[]},
];
HOLOS.forEach(function(h){for(var i=0;i<8;i++)h.data.push(0.2+Math.random()*0.8);});

// Ambient particles
var ambient=[];
for(var ai=0;ai<55;ai++)ambient.push({x:Math.random(),y:Math.random()*0.5,vx:(Math.random()-0.5)*0.00015,vy:-Math.random()*0.00025,r:Math.random()*1.5+0.3,c:['#7c3aed','#4c1d95','#3b82f6','#f472b6','#34d399','#fde047'][Math.floor(Math.random()*6)]});

// Server blinks
var serverBlinks=Array.from({length:20},function(){return{on:Math.random()<0.6,t:Math.floor(Math.random()*60)};});

// Stars
var STARS=[];
for(var si=0;si<80;si++)STARS.push({x:Math.random(),y:Math.random()*0.2,r:Math.random()*1.4+0.3,a:Math.random()});

// ─── Agents ─────────────────────────────────────────────────────
var agents=DEFS.map(function(d,i){
  // Each agent owns a desk
  var desk=DESKS[i%DESKS.length];
  var homeSpots=[{x:desk.x,y:desk.y+1},{x:desk.x+1,y:desk.y},{x:desk.x-1,y:desk.y}];
  var home=homeSpots.find(function(s){return walkable(s.x,s.y);})||rw();
  return{name:d.name,role:d.role,color:d.color,hat:d.hat,spd:d.spd,
    gx:home.x+Math.random()*0.3,gy:home.y+Math.random()*0.3,
    tx:home.x,ty:home.y,
    home:home,deskIdx:i%DESKS.length,
    beh:"working",timer:20+i*8,sitting:false,arrived:false,
    onZoom:Math.random()<0.4,
    px:0,py:0,pulse:0,trail:[],
    chatPause:0,chatBubbleTimer:0,chatPartner:null,chatCooldown:0};
});

function pickTarget(ag){
  var r=Math.random();
  // 30% → own desk (brief sit)
  if(r<0.30){ag.tx=ag.home.x;ag.ty=ag.home.y;ag.beh="working";ag.onZoom=Math.random()<0.4;return;}
  // 13% → coffee
  if(r<0.43){var ca=[{x:COFFEE.x-1,y:COFFEE.y},{x:COFFEE.x,y:COFFEE.y+1}];for(var k=0;k<ca.length;k++){if(walkable(ca[k].x,ca[k].y)){ag.tx=ca[k].x;ag.ty=ca[k].y;ag.beh="caffeinating";return;}}}
  // 10% → water
  if(r<0.53){var wa=[{x:WATER.x-1,y:WATER.y},{x:WATER.x,y:WATER.y+1}];for(var j=0;j<wa.length;j++){if(walkable(wa[j].x,wa[j].y)){ag.tx=wa[j].x;ag.ty=wa[j].y;ag.beh="hydrating";return;}}}
  // 47% → walk to a colleague's desk
  var deskIdx=Math.floor(Math.random()*DESKS.length);
  if(deskIdx===ag.deskIdx)deskIdx=(deskIdx+1)%DESKS.length;
  var d=DESKS[deskIdx];
  var c=[{x:d.x,y:d.y+1},{x:d.x+1,y:d.y},{x:d.x-1,y:d.y}];
  for(var i=0;i<c.length;i++){
    if(walkable(c[i].x,c[i].y)){ag.tx=c[i].x;ag.ty=c[i].y;ag.beh="visiting";ag.visitDeskIdx=deskIdx;return;}
  }
  ag.tx=ag.home.x;ag.ty=ag.home.y;ag.beh="working";
}

function updateAgent(ag){
  ag.pulse=Math.max(0,ag.pulse-0.035);
  ag.trail.push({x:ag.gx,y:ag.gy});if(ag.trail.length>14)ag.trail.shift();
  if(!ag.chatCooldown)ag.chatCooldown=0;
  ag.chatCooldown=Math.max(0,ag.chatCooldown-1);

  // Bubble on proximity — no freeze ever
  if(!ag.chatCooldown&&Math.random()<0.004){
    for(var pi=0;pi<agents.length;pi++){
      var peer=agents[pi];if(peer===ag||peer.chatCooldown)continue;
      var pdx=ag.gx-peer.gx,pdy=ag.gy-peer.gy;
      if(pdx*pdx+pdy*pdy<2.25){
        spawnBubble(ag,MSGS[Math.floor(Math.random()*MSGS.length)][2]);
        ag.chatCooldown=140;peer.chatCooldown=80;totalMessages++;ag.pulse=1;break;
      }
    }
  }

  // Arrived → immediately pick next destination, never wait
  var at=Math.abs(ag.gx-ag.tx)<0.15&&Math.abs(ag.gy-ag.ty)<0.15;
  if(at&&!ag.arrived){
    ag.arrived=true;
    if(ag.beh==="caffeinating")totalBrews++;
    if(ag.beh==="working")totalTasks++;
    if(ag.beh==="visiting"){
      var owner=agents[ag.visitDeskIdx];
      if(owner&&!ag.chatCooldown){
        spawnBubble(ag,MSGS[Math.floor(Math.random()*MSGS.length)][2]);
        spawnBubble(owner,MSGS[Math.floor(Math.random()*MSGS.length)][2]);
        ag.chatCooldown=140;owner.chatCooldown=80;totalMessages++;ag.pulse=1;owner.pulse=1;
      }
    }
    pickTarget(ag);
    // If new target is same spot, force a random one
    var ndx=ag.tx-ag.gx,ndy=ag.ty-ag.gy;
    if(ndx*ndx+ndy*ndy<0.3){var rp=rw();ag.tx=rp.x;ag.ty=rp.y;ag.beh="wandering";}
  }
  if(!at)ag.arrived=false;

  // Always move toward target
  var dx=ag.tx-ag.gx,dy=ag.ty-ag.gy,d=Math.sqrt(dx*dx+dy*dy);
  if(d>0.05){
    var spd=ag.spd*(d<1.5?d/1.5:1);
    var nx=0,ny=0;
    for(var ci=0;ci<agents.length;ci++){
      var other=agents[ci];if(other===ag)continue;
      var odx=ag.gx-other.gx,ody=ag.gy-other.gy,od=Math.sqrt(odx*odx+ody*ody);
      if(od<1.2&&od>0.01){nx+=odx/od*(1.2-od)*0.15;ny+=ody/od*(1.2-od)*0.15;}
    }
    ag.gx+=(dx/d)*spd+nx*0.008;ag.gy+=(dy/d)*spd+ny*0.008;
  }
}

// ─── Canvas ─────────────────────────────────────────────────────
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var mmC=document.getElementById('mm'),mmX=mmC.getContext('2d');
var gC=document.getElementById('graph-canvas'),gX=gC.getContext('2d');
var W,H,OX,OY;
function resize(){var wr=canvas.parentElement;W=canvas.width=wr.clientWidth;H=canvas.height=wr.clientHeight;OX=W*0.47;OY=H*0.11;}
resize();window.addEventListener('resize',resize);

function toS(gx,gy){return{sx:OX+isoX(gx,gy),sy:OY+isoY(gx,gy)};}
function hexRGB(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

function tile(gx,gy,fill,str){
  var p=toS(gx,gy),sx=p.sx,sy=p.sy;
  ctx.beginPath();ctx.moveTo(sx,sy-TH/2);ctx.lineTo(sx+TW/2,sy);ctx.lineTo(sx,sy+TH/2);ctx.lineTo(sx-TW/2,sy);ctx.closePath();
  ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=str||'rgba(50,15,110,0.18)';ctx.lineWidth=0.5;ctx.stroke();
}
function box(gx,gy,h,side,top,glow){
  var p=toS(gx,gy),sx=p.sx,sy=p.sy,tw2=TW/2,th2=TH/2,ph=h*TZ;
  if(glow){ctx.save();ctx.shadowColor=glow;ctx.shadowBlur=14;}
  ctx.beginPath();ctx.moveTo(sx-tw2,sy);ctx.lineTo(sx-tw2,sy-ph);ctx.lineTo(sx,sy-ph-th2);ctx.lineTo(sx,sy-th2);ctx.closePath();ctx.fillStyle=side;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy-th2);ctx.lineTo(sx,sy-th2-ph);ctx.lineTo(sx+tw2,sy-ph);ctx.lineTo(sx+tw2,sy);ctx.closePath();ctx.fillStyle=top;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy-th2-ph);ctx.lineTo(sx+tw2,sy-ph);ctx.lineTo(sx,sy+th2-ph);ctx.lineTo(sx-tw2,sy-ph);ctx.closePath();ctx.fillStyle=top;ctx.fill();ctx.stroke();
  if(glow)ctx.restore();
}

// ─── Draw holographic panel ──────────────────────────────────────
var frame=0;
function drawHolo(h){
  var desk=DESKS[h.deskIdx];
  var p=toS(desk.x,desk.y);
  var sx=p.sx,sy=p.sy-TZ*0.65-38;
  var w=54,ht=28,alpha=0.72+0.12*Math.sin(frame*0.04+h.deskIdx);
  ctx.save();ctx.globalAlpha=alpha;
  // Panel bg
  ctx.fillStyle='rgba(4,2,20,0.85)';rr(ctx,sx-w/2,sy-ht,w,ht,3);ctx.fill();
  ctx.strokeStyle='rgba(124,58,237,0.6)';ctx.lineWidth=0.8;rr(ctx,sx-w/2,sy-ht,w,ht,3);ctx.stroke();
  // Label
  ctx.font='6px Courier New';ctx.textAlign='center';ctx.fillStyle='#6d28d9';ctx.fillText(h.label,sx,sy-ht+6);
  // Animate data
  if(frame%40===h.deskIdx*6%40)h.data.push(0.1+Math.random()*0.9);
  if(h.data.length>8)h.data.shift();
  var bw=5,gap=1,ox=sx-w/2+4;
  if(h.type==='bars'){
    h.data.forEach(function(v,i){
      var bh=(ht-12)*v,by=sy-4-bh;
      var hue=200+i*20;ctx.fillStyle='hsla('+hue+',80%,60%,0.9)';
      ctx.fillRect(ox+i*(bw+gap),by,bw,bh);
    });
  } else if(h.type==='line'){
    ctx.beginPath();
    h.data.forEach(function(v,i){
      var lx=ox+i*(bw+gap)+bw/2,ly=sy-4-(ht-12)*v;
      i===0?ctx.moveTo(lx,ly):ctx.lineTo(lx,ly);
    });
    ctx.strokeStyle='rgba(52,211,153,0.8)';ctx.lineWidth=1.2;ctx.stroke();
    // Dot on latest
    var last=h.data[h.data.length-1];
    ctx.beginPath();ctx.arc(ox+(h.data.length-1)*(bw+gap)+bw/2,sy-4-(ht-12)*last,2,0,Math.PI*2);ctx.fillStyle='#34d399';ctx.fill();
  } else if(h.type==='pie'){
    var cx2=sx,cy2=sy-ht/2-2,rad=9;
    var segs=[0.35,0.25,0.4],colors=['#c4b5fd','#f472b6','#4ade80'];var angle=0;
    segs.forEach(function(s,i){var end=angle+s*Math.PI*2;ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.arc(cx2,cy2,rad,angle,end);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();angle=end;});
  }
  // Connector line down to desk
  ctx.strokeStyle='rgba(124,58,237,0.25)';ctx.lineWidth=0.6;ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy+8);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
}

// ─── Draw scene ─────────────────────────────────────────────────
function drawScene(){
  ctx.clearRect(0,0,W,H);
  // Sky gradient
  var bg=ctx.createLinearGradient(0,0,0,H*0.55);bg.addColorStop(0,'#0e0525');bg.addColorStop(1,'#04020c');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Stars
  STARS.forEach(function(s){ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(0.15+0.5*Math.abs(Math.sin(frame*0.007+s.a)))+')';ctx.fill();});
  // Nebula blobs
  [[0.2,0.08,'#5b21b6'],[0.7,0.05,'#1d4ed8'],[0.5,0.12,'#7c3aed']].forEach(function(nb){
    var ng=ctx.createRadialGradient(nb[0]*W,nb[1]*H,0,nb[0]*W,nb[1]*H,W*0.18);
    ng.addColorStop(0,'rgba('+hexRGB(nb[2])+',0.06)');ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng;ctx.fillRect(0,0,W,H*0.3);
  });
  // Ambient particles
  ambient.forEach(function(pt){pt.x+=pt.vx;pt.y+=pt.vy;if(pt.y<0){pt.y=0.5+Math.random()*0.5;pt.x=Math.random();}if(pt.x<0||pt.x>1)pt.x=Math.random();ctx.beginPath();ctx.arc(pt.x*W,pt.y*H*0.55,pt.r,0,Math.PI*2);ctx.fillStyle=pt.c+'2a';ctx.fill();});

  // ── Floor ──
  for(var gy=0;gy<ROWS;gy++){
    for(var gx=0;gx<COLS;gx++){
      var edge=gx===0||gy===0||gx===COLS-1||gy===ROWS-1;
      if(edge){tile(gx,gy,'#0a0620','rgba(80,30,180,0.55)');}
      else{
        var dark=(gx+gy)%2===0;
        var accent=(gx%4===0||gy%4===0);
        // Carpet in work area, tile near amenities
        var isCarpet=gx>=2&&gx<=11&&gy>=2&&gy<=10;
        var isTile=gx>=12||gy>=11;
        var baseColor=isCarpet?(dark?'#130e2e':'#170f35'):isTile?(dark?'#0e1018':'#111520'):(dark?'#0e092a':'#120d31');
        tile(gx,gy,baseColor,accent?'rgba(90,40,180,0.35)':'rgba(45,15,110,0.12)');
      }
    }
  }

  // Ceiling light glow pools
  for(var lx2=4;lx2<COLS-1;lx2+=4){for(var ly2=4;ly2<ROWS-1;ly2+=4){var lp=toS(lx2,ly2);var lg=ctx.createRadialGradient(lp.sx,lp.sy,0,lp.sx,lp.sy,60);lg.addColorStop(0,'rgba(180,150,255,0.055)');lg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=lg;ctx.fillRect(lp.sx-60,lp.sy-60,120,120);}}

  // ── Data streams on floor ──
  streams.forEach(function(st){
    st.pos+=st.speed;if(st.pos>COLS)st.pos=0;
    if(st.axis==='h'){
      for(var seg=0;seg<st.len;seg++){
        var fp=st.pos-seg*0.5;if(fp<0||fp>=COLS)continue;
        var sp=toS(fp,st.row);var alpha=(1-seg/st.len)*0.45;
        ctx.beginPath();ctx.arc(sp.sx,sp.sy,2.5-seg*0.2,0,Math.PI*2);ctx.fillStyle='rgba('+hexRGB(st.color)+','+alpha+')';ctx.fill();
      }
    } else {
      for(var seg2=0;seg2<st.len;seg2++){
        var fp2=st.pos-seg2*0.5;if(fp2<0||fp2>=ROWS)continue;
        var sp2=toS(st.col,fp2);var alpha2=(1-seg2/st.len)*0.4;
        ctx.beginPath();ctx.arc(sp2.sx,sp2.sy,2.5-seg2*0.2,0,Math.PI*2);ctx.fillStyle='rgba('+hexRGB(st.color)+','+alpha2+')';ctx.fill();
      }
    }
  });

  // ── Walls ──
  ctx.save();ctx.globalAlpha=0.5;
  for(var wgx=0;wgx<COLS;wgx++)box(wgx,0,0.7,'#140850','#1e0f6a');
  for(var wgy=1;wgy<ROWS;wgy++)box(0,wgy,0.7,'#140850','#1e0f6a');
  ctx.restore();

  // ── Persistent network lines (dim, always on) ──
  ctx.save();ctx.globalAlpha=0.12;
  NET_PAIRS.forEach(function(pair){
    var a=agents[pair[0]],b=agents[pair[1]];
    var ap=toS(a.gx,a.gy),bp=toS(b.gx,b.gy);
    ctx.beginPath();ctx.moveTo(ap.sx,ap.sy-18);ctx.lineTo(bp.sx,bp.sy-18);
    ctx.strokeStyle=a.color;ctx.lineWidth=0.8;ctx.stroke();
  });
  ctx.restore();

  // ── Desks ──
  DESKS.forEach(function(d,i){
    box(d.x,d.y,0.65,'#26180a','#382408');
    var dp=toS(d.x,d.y),dsx=dp.sx,dsy=dp.sy-TZ*0.65;
    ctx.fillStyle='#04101e';ctx.fillRect(dsx-9,dsy-28,18,14);
    // Find agent at this desk
    var deskAg=null;for(var ai=0;ai<agents.length;ai++){if(agents[ai].deskIdx===i&&agents[ai].sitting)deskAg=agents[ai];}
    if(deskAg&&deskAg.onZoom){
      // Zoom grid — 4 faces
      ctx.fillStyle='#1a1a2a';ctx.fillRect(dsx-7,dsy-26,14,12);
      var zColors=['#3b2a5a','#1a3a2a','#3a2a1a','#2a1a3a'];
      [[0,0],[1,0],[0,1],[1,1]].forEach(function(cell,ci){
        ctx.fillStyle=zColors[ci];ctx.fillRect(dsx-7+cell[0]*7,dsy-26+cell[1]*6,6,5);
        // Tiny face dots
        ctx.fillStyle='rgba(255,220,180,0.7)';ctx.beginPath();ctx.arc(dsx-4+cell[0]*7,dsy-24+cell[1]*6,1.2,0,Math.PI*2);ctx.fill();
      });
      // Zoom bar
      ctx.fillStyle='#18181f';ctx.fillRect(dsx-7,dsy-14,14,2);
      ctx.fillStyle='#2563eb';ctx.fillRect(dsx-7,dsy-14,4,2);
      // Mic icon
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(dsx+4,dsy-14,1,2);
    } else {
      // Regular work screen
      var hue=frame*0.4+i*25;
      var scg=ctx.createLinearGradient(dsx-7,dsy-26,dsx+7,dsy-16);
      scg.addColorStop(0,'hsla('+hue+',65%,45%,0.8)');scg.addColorStop(1,'hsla('+(hue+40)+',55%,30%,0.5)');
      ctx.fillStyle=scg;ctx.fillRect(dsx-7,dsy-26,14,12);
      for(var sl=0;sl<6;sl++){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(dsx-7,dsy-26+sl*2,14,1);}
    }
    var mg=ctx.createRadialGradient(dsx,dsy-20,0,dsx,dsy-20,20);mg.addColorStop(0,'rgba(100,120,255,0.07)');mg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=mg;ctx.fillRect(dsx-20,dsy-33,40,28);
  });

  // ── Server rack ──
  box(SERVER.x,SERVER.y,2.8,'#081408','#0e2210',null);
  var srp=toS(SERVER.x,SERVER.y),srx=srp.sx,sry=srp.sy-TZ*2.8;
  // Rack slots
  for(var ri=0;ri<6;ri++){ctx.fillStyle='#0a1a0a';ctx.fillRect(srx-12,sry+ri*10,24,8);ctx.strokeStyle='#1a3a1a';ctx.lineWidth=0.5;ctx.strokeRect(srx-12,sry+ri*10,24,8);}
  serverBlinks.forEach(function(bl,bi){bl.t--;if(bl.t<=0){bl.on=!bl.on;bl.t=15+Math.floor(Math.random()*70);}var row=Math.floor(bi/5),col=bi%5;var lx=srx-9+col*5,ly=sry+row*10+4;ctx.beginPath();ctx.arc(lx,ly,1.5,0,Math.PI*2);var lc=bi%3===0?'#4ade80':bi%3===1?'#60a5fa':'#f87171';ctx.fillStyle=bl.on?lc:'#0a0a0a';ctx.fill();if(bl.on){ctx.save();ctx.shadowColor=lc;ctx.shadowBlur=5;ctx.fill();ctx.restore();}});
  // Data waterfall off server
  for(var wfi=0;wfi<5;wfi++){var wfp=toS(SERVER.x-0.5,SERVER.y+0.5);ctx.beginPath();ctx.arc(wfp.sx+wfi*6-12,wfp.sy-(frame*2+wfi*30)%80,1,0,Math.PI*2);ctx.fillStyle='rgba(74,222,128,'+(0.1+0.3*Math.sin(frame*0.1+wfi))+')';ctx.fill();}
  ctx.font='6px Courier New';ctx.textAlign='center';ctx.fillStyle='rgba(74,222,128,0.5)';ctx.fillText('SERVER',srx,sry-3);

  // ── Water cooler ──
  box(WATER.x,WATER.y,1.4,'#0a1830','#153090',null);
  var wp=toS(WATER.x,WATER.y),wbx=wp.sx,wby=wp.sy-TZ*1.4;
  var wbg=ctx.createRadialGradient(wbx,wby-3,1,wbx,wby-3,9);wbg.addColorStop(0,'rgba(147,197,253,0.9)');wbg.addColorStop(1,'rgba(59,130,246,0.05)');ctx.beginPath();ctx.arc(wbx,wby-3,8,0,Math.PI*2);ctx.fillStyle=wbg;ctx.fill();
  ctx.fillStyle='rgba(96,165,250,0.5)';ctx.fillText('H\u2082O',wbx,wp.sy+7);

  // ── Coffee station ──
  box(COFFEE.x,COFFEE.y,0.9,'#280e04','#541e08',null);
  var cop=toS(COFFEE.x,COFFEE.y),csx=cop.sx,csy2=cop.sy-TZ*0.9;
  for(var ci=0;ci<3;ci++){ctx.beginPath();ctx.moveTo(csx+ci*5-5,csy2-2);ctx.bezierCurveTo(csx+ci*5-8,csy2-9,csx+ci*5+5,csy2-13,csx+ci*5+2,csy2-19);ctx.strokeStyle='rgba(200,175,140,'+(0.18+0.16*Math.sin(frame*0.09+ci*1.5))+')';ctx.lineWidth=1.5;ctx.stroke();}
  ctx.fillStyle='rgba(251,146,60,0.45)';ctx.fillText('BREW',csx,cop.sy+7);

  // ── Meeting table ──
  box(MEETING.x,MEETING.y,0.4,'#170a35','#281460','#7c3aed');
  var mtp=toS(MEETING.x,MEETING.y);ctx.fillStyle='rgba(167,139,250,0.4)';ctx.fillText('MTG',mtp.sx,mtp.sy+8);
  // Glow around meeting table
  var mtg=ctx.createRadialGradient(mtp.sx,mtp.sy,0,mtp.sx,mtp.sy,40);mtg.addColorStop(0,'rgba(124,58,237,0.07)');mtg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=mtg;ctx.fillRect(mtp.sx-40,mtp.sy-40,80,80);

  // ── Whiteboard ──
  box(WHITEBOARD.x,WHITEBOARD.y,1.6,'#0e082a','#18115a',null);
  var wbop=toS(WHITEBOARD.x,WHITEBOARD.y),wbsx=wbop.sx,wbsy=wbop.sy-TZ*1.6;
  ctx.fillStyle='#ece8ff';ctx.fillRect(wbsx-13,wbsy-16,26,20);
  ctx.strokeStyle='#6d28d9';ctx.lineWidth=0.9;ctx.beginPath();ctx.moveTo(wbsx-11,wbsy-5);ctx.lineTo(wbsx-4,wbsy-12);ctx.lineTo(wbsx+4,wbsy-6);ctx.lineTo(wbsx+10,wbsy-10);ctx.stroke();
  ctx.strokeStyle='#f472b6';ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(wbsx+8,wbsy-5,3,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#7c3aed';ctx.fillRect(wbsx-11,wbsy-14,4,1);ctx.fillRect(wbsx-11,wbsy-11,6,1);

  // ── Printer ──
  box(PRINTER.x,PRINTER.y,0.5,'#1a1a2e','#24244a',null);
  // Paper slot flicker
  if(Math.random()<0.01){ctx.fillStyle='#f0f0ff';ctx.fillRect(toS(PRINTER.x,PRINTER.y).sx-4,toS(PRINTER.x,PRINTER.y).sy-TZ*0.5-2,8,3);}

  // ── Sofas ──
  SOFAS.forEach(function(sf){box(sf.x,sf.y,0.6,'#360b72','#521aa0',null);});

  // ── Plants ──
  PLANTS.forEach(function(pl){
    box(pl.x,pl.y,0.45,'#091809','#113214',null);
    var pp=toS(pl.x,pl.y),ppx=pp.sx,ppy=pp.sy-TZ*0.45;
    var pg=ctx.createRadialGradient(ppx,ppy-7,1,ppx,ppy-7,11);pg.addColorStop(0,'rgba(74,222,128,0.88)');pg.addColorStop(1,'rgba(21,128,61,0.1)');
    ctx.beginPath();ctx.arc(ppx,ppy-7,11,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
  });

  // ── Holographic panels above desks ──
  HOLOS.forEach(drawHolo);

  // ── Communication beams ──
  beams=beams.filter(function(b){b.life--;return b.life>0;});
  beams.forEach(function(b){
    var fp=toS(b.fx,b.fy),tp=toS(b.tx2,b.ty2);
    var fsx=fp.sx,fsy=fp.sy-22,tsx2=tp.sx,tsy2=tp.sy-22;
    var t=1-b.life/b.maxLife,alpha=Math.min(1,b.life/20)*0.65;
    ctx.save();ctx.globalAlpha=alpha;
    // Beam line
    ctx.beginPath();ctx.moveTo(fsx,fsy);ctx.lineTo(tsx2,tsy2);ctx.strokeStyle=b.color;ctx.lineWidth=0.8;ctx.stroke();
    // Glow line
    ctx.lineWidth=3;ctx.strokeStyle='rgba('+hexRGB(b.color)+',0.15)';ctx.stroke();
    // Traveling packet
    var px=fsx+(tsx2-fsx)*t,py=fsy+(tsy2-fsy)*t;
    ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.fill();
    ctx.restore();
  });

  // ── Particle explosions ──
  explosions=explosions.filter(function(e){e.life--;return e.life>0;});
  explosions.forEach(function(e){
    e.particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(e.life/e.maxLife),0,Math.PI*2);
      ctx.fillStyle='rgba('+hexRGB(e.color)+','+(e.life/e.maxLife*0.8)+')';ctx.fill();
    });
  });

  // ── Agents ──
  var sorted=agents.slice().sort(function(a,b){return(a.gx+a.gy)-(b.gx+b.gy);});
  sorted.forEach(drawAgent);

  // ── Speech bubbles ──
  bubbles=bubbles.filter(function(b){b.life--;return b.life>0;});
  bubbles.forEach(drawBubble);

  ctx.textAlign='left';
}

function drawAgent(ag){
  var p=toS(ag.gx,ag.gy),sx=p.sx,sy=p.sy;

  // Depth scale — agents further back (low gx+gy) appear slightly smaller
  var depth=(ag.gx+ag.gy)/(COLS+ROWS);
  var sc=0.72+depth*0.38;

  // Walking bob — vertical bounce tied to movement speed
  var moving=!ag.sitting;
  var bob=moving?Math.sin(frame*0.35+ag.gx*3+ag.gy*2)*0.8*sc:0;

  // Leg swing angle
  var legSwing=moving?Math.sin(frame*0.35+ag.gx*3+ag.gy*2)*5:0;

  // Base Y with bob and scale offset
  var by=sy+bob;

  // Shadow — ellipse flattens when agent is "farther back"
  ctx.beginPath();ctx.ellipse(sx,by+TH*0.22*sc,11*sc,4*sc,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();

  // Subtle halo
  if(ag.pulse>0.05){
    var gh=ctx.createRadialGradient(sx,by-14*sc,1,sx,by-14*sc,22*sc);
    gh.addColorStop(0,'rgba('+hexRGB(ag.color)+','+ag.pulse*0.35+')');gh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,by-14*sc,22*sc,0,Math.PI*2);ctx.fillStyle=gh;ctx.fill();
  }

  ctx.save();ctx.translate(sx,by);ctx.scale(sc,sc);

  // ── Legs ──
  var legColor=ag.color+'cc';
  ctx.strokeStyle=legColor;ctx.lineWidth=3;ctx.lineCap='round';
  if(ag.sitting){
    // Seated legs bent forward
    ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(-5,4);ctx.lineTo(-3,6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-4);ctx.lineTo(5,4);ctx.lineTo(3,6);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(-4+legSwing*0.5,8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-4);ctx.lineTo(4-legSwing*0.5,8);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-4+legSwing*0.5,8);ctx.lineTo(-7+legSwing*0.4,10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4-legSwing*0.5,8);ctx.lineTo(7-legSwing*0.4,10);ctx.stroke();
  }

  // ── Body — slight slouch when sitting ──
  var bodyTilt=ag.sitting?0.15:0;
  ctx.save();ctx.rotate(bodyTilt);
  ctx.beginPath();ctx.ellipse(0,-14,7,10,0,0,Math.PI*2);ctx.fillStyle=ag.color;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // ── Arms — typing when sitting, swinging when walking ──
  ctx.strokeStyle=ag.color;ctx.lineWidth=2.5;ctx.lineCap='round';
  if(ag.sitting){
    // Arms forward on desk
    ctx.beginPath();ctx.moveTo(-6,-18);ctx.lineTo(-10,-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6,-18);ctx.lineTo(10,-12);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-6,-18);ctx.lineTo(-9-legSwing*0.4,-10+legSwing*0.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6,-18);ctx.lineTo(9+legSwing*0.4,-10-legSwing*0.2);ctx.stroke();
  }

  // ── Head ──
  ctx.beginPath();ctx.arc(0,-26,7,0,Math.PI*2);
  // Skin tones vary by agent index
  var skinTones=['#f5d0a9','#e8b88a','#d4956a','#c47c50','#f0c8a0','#fad5b0'];
  ctx.fillStyle=skinTones[DEFS.findIndex(function(d){return d.name===ag.name;})%skinTones.length];
  ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;ctx.stroke();

  // Eyes — blink occasionally
  var blink=(frame+ag.gx*17)%120<3;
  if(!blink){ctx.fillStyle='#1a0a30';ctx.beginPath();ctx.arc(-2.5,-27,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(2.5,-27,1.2,0,Math.PI*2);ctx.fill();}
  else{ctx.strokeStyle='#1a0a30';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(-4,-27);ctx.lineTo(-1,-27);ctx.stroke();ctx.beginPath();ctx.moveTo(1,-27);ctx.lineTo(4,-27);ctx.stroke();}

  // ── Hat ──
  if(ag.hat==='crown'){ctx.fillStyle='#f59e0b';ctx.fillRect(-5,-36,10,6);for(var i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-4+i*4,-36);ctx.lineTo(-3+i*4,-41);ctx.lineTo(-2+i*4,-36);ctx.fillStyle='#fbbf24';ctx.fill();}}
  else if(ag.hat==='top'){ctx.fillStyle='#12102a';ctx.fillRect(-5,-34,10,2);ctx.fillRect(-4,-40,8,7);}
  else if(ag.hat==='cap'){ctx.beginPath();ctx.arc(0,-32,6,Math.PI,0);ctx.fillStyle=ag.color;ctx.fill();ctx.fillRect(-2,-33,9,3);}
  else if(ag.hat==='fedora'){ctx.beginPath();ctx.arc(0,-32,5,Math.PI,0);ctx.fillStyle='#342012';ctx.fill();ctx.fillRect(-8,-33,16,3);}
  else if(ag.hat==='bowler'){ctx.beginPath();ctx.arc(0,-32,5,Math.PI,0);ctx.fillStyle='#1a1830';ctx.fill();ctx.fillRect(-7,-33,14,2);}
  else if(ag.hat==='hard'){ctx.beginPath();ctx.arc(0,-32,6,Math.PI,0);ctx.fillStyle='#c97706';ctx.fill();ctx.fillRect(-8,-33,16,2);}

  ctx.restore();

  // ── Name tag (screen-space, no scale) ──
  ctx.font='bold '+(8*sc+2)+'px Courier New';ctx.textAlign='center';
  var lw=ctx.measureText(ag.name).width;
  var tagY=by-52*sc;
  ctx.fillStyle='rgba(4,2,14,0.82)';rr(ctx,sx-lw/2-4,tagY-13,lw+8,13,3);ctx.fill();
  ctx.strokeStyle=ag.color+'44';ctx.lineWidth=0.6;rr(ctx,sx-lw/2-4,tagY-13,lw+8,13,3);ctx.stroke();
  ctx.fillStyle=ag.color;ctx.fillText(ag.name,sx,tagY-3);

  ctx.textAlign='left';
  ag.px=sx;ag.py=by-20*sc;
}

function drawBubble(b){
  var ag=b.ag,p=toS(ag.gx,ag.gy),sx=p.sx,sy=p.sy-68;
  var alpha=Math.min(1,b.life/25)*Math.min(1,(b.maxLife-b.life+25)/25);
  ctx.save();ctx.globalAlpha=alpha;ctx.font='8px Courier New';ctx.textAlign='center';
  var text=b.text.length>30?b.text.slice(0,30)+'…':b.text;
  var tw=ctx.measureText(text).width,bw=tw+16,bh=18;
  ctx.fillStyle='rgba(6,3,18,0.96)';rr(ctx,sx-bw/2,sy-bh,bw,bh,4);ctx.fill();
  ctx.strokeStyle=ag.color+'88';ctx.lineWidth=0.7;rr(ctx,sx-bw/2,sy-bh,bw,bh,4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx-4,sy);ctx.lineTo(sx,sy+7);ctx.lineTo(sx+4,sy);ctx.closePath();ctx.fillStyle='rgba(6,3,18,0.96)';ctx.fill();
  ctx.fillStyle=ag.color;ctx.fillText(text,sx,sy-6);
  ctx.restore();
}

// ─── Minimap ────────────────────────────────────────────────────
var radarAngle=0;
function drawMinimap(){
  var mw=mmC.width,mh=mmC.height;
  mmX.fillStyle='#04020a';mmX.fillRect(0,0,mw,mh);
  var sx2=function(gx){return 2+(gx/COLS)*(mw-4);},sy2=function(gy){return 2+(gy/ROWS)*(mh-4);};
  // Grid
  mmX.strokeStyle='rgba(60,20,120,0.3)';mmX.lineWidth=0.3;
  for(var gi=0;gi<=COLS;gi+=4){mmX.beginPath();mmX.moveTo(sx2(gi),2);mmX.lineTo(sx2(gi),mh-2);mmX.stroke();}
  for(var gj=0;gj<=ROWS;gj+=4){mmX.beginPath();mmX.moveTo(2,sy2(gj));mmX.lineTo(mw-2,sy2(gj));mmX.stroke();}
  // Furniture
  DESKS.forEach(function(d){mmX.fillStyle='#2d1860';mmX.fillRect(sx2(d.x)-2,sy2(d.y)-1.5,5,3);});
  mmX.fillStyle='#1d4ed8';mmX.fillRect(sx2(WATER.x)-2,sy2(WATER.y)-2,5,5);
  mmX.fillStyle='#7c3f0f';mmX.fillRect(sx2(COFFEE.x)-2,sy2(COFFEE.y)-2,5,5);
  mmX.fillStyle='rgba(124,58,237,0.5)';mmX.fillRect(sx2(MEETING.x)-3,sy2(MEETING.y)-3,7,7);
  // Beams on minimap
  beams.forEach(function(b){mmX.strokeStyle=b.color+'66';mmX.lineWidth=0.7;mmX.beginPath();mmX.moveTo(sx2(b.fx),sy2(b.fy));mmX.lineTo(sx2(b.tx2),sy2(b.ty2));mmX.stroke();});
  // Network lines dim
  mmX.globalAlpha=0.15;
  NET_PAIRS.forEach(function(pair){var a=agents[pair[0]],b=agents[pair[1]];mmX.strokeStyle=a.color;mmX.lineWidth=0.5;mmX.beginPath();mmX.moveTo(sx2(a.gx),sy2(a.gy));mmX.lineTo(sx2(b.gx),sy2(b.gy));mmX.stroke();});
  mmX.globalAlpha=1;
  // Agents
  agents.forEach(function(ag){
    mmX.beginPath();mmX.arc(sx2(ag.gx),sy2(ag.gy),2.5,0,Math.PI*2);mmX.fillStyle=ag.color;mmX.fill();
    if(ag.pulse>0.3){mmX.beginPath();mmX.arc(sx2(ag.gx),sy2(ag.gy),5,0,Math.PI*2);mmX.strokeStyle=ag.color+'66';mmX.lineWidth=1;mmX.stroke();}
  });
  // Radar sweep
  radarAngle=(radarAngle+0.03)%(Math.PI*2);
  var cx=mw/2,cy=mh/2,rr2=Math.min(mw,mh)/2-2;
  var sweepGrad=mmX.createConicalGradient?null:null;
  mmX.save();mmX.globalAlpha=0.2;mmX.strokeStyle='rgba(124,58,237,0.6)';mmX.lineWidth=0.6;
  mmX.beginPath();mmX.moveTo(cx,cy);mmX.arc(cx,cy,rr2,radarAngle,radarAngle+0.6);mmX.closePath();
  mmX.fillStyle='rgba(124,58,237,0.08)';mmX.fill();mmX.restore();
  // Border
  mmX.strokeStyle='rgba(76,29,149,0.5)';mmX.lineWidth=1;mmX.strokeRect(0,0,mw,mh);
}

// ─── Activity graph ──────────────────────────────────────────────
function drawGraph(){
  gX.fillStyle='rgba(4,2,14,0.95)';gX.fillRect(0,0,200,50);
  var max=Math.max(1,Math.max.apply(null,msgHistory));
  gX.strokeStyle='rgba(60,20,120,0.4)';gX.lineWidth=0.4;
  for(var gi=0;gi<5;gi++){var gy2=(gi+1)/5*48;gX.beginPath();gX.moveTo(0,gy2);gX.lineTo(200,gy2);gX.stroke();}
  gX.beginPath();
  msgHistory.forEach(function(v,i){var x=i*(200/60),y=48-v/max*44;i===0?gX.moveTo(x,y):gX.lineTo(x,y);});
  gX.strokeStyle='rgba(124,58,237,0.8)';gX.lineWidth=1.5;gX.stroke();
  // Fill under
  gX.beginPath();
  msgHistory.forEach(function(v,i){var x=i*(200/60),y=48-v/max*44;i===0?gX.moveTo(x,y):gX.lineTo(x,y);});
  gX.lineTo(200,48);gX.lineTo(0,48);gX.closePath();gX.fillStyle='rgba(124,58,237,0.1)';gX.fill();
  // Latest dot
  var lv=msgHistory[msgHistory.length-1];
  gX.beginPath();gX.arc(198,48-lv/max*44,2.5,0,Math.PI*2);gX.fillStyle='#c4b5fd';gX.fill();
}

// ─── Feed ───────────────────────────────────────────────────────
var feedList=document.getElementById('feed-list');
function fmtTime(){var n=new Date(),h=n.getHours()%12||12,m=('0'+n.getMinutes()).slice(-2),s=('0'+n.getSeconds()).slice(-2);return h+':'+m+':'+s;}
function pushFeed(){
  totalMsgs++;
  var curSec=Math.floor((Date.now()-startTime)/1000);
  if(curSec!==lastMsgSec){msgHistory.push(0);if(msgHistory.length>60)msgHistory.shift();lastMsgSec=curSec;}
  msgHistory[msgHistory.length-1]++;
  var msg=MSGS[Math.floor(Math.random()*MSGS.length)];
  var fromAg=null,toAg=null;
  for(var i=0;i<agents.length;i++){if(agents[i].name===msg[0])fromAg=agents[i];if(agents[i].name===msg[1])toAg=agents[i];}
  var fromDef=null;for(var j=0;j<DEFS.length;j++){if(DEFS[j].name===msg[0])fromDef=DEFS[j];}
  var color=fromDef?fromDef.color:'#a78bfa';
  var item=document.createElement('div');item.className='fi';
  var ts=document.createElement('span');ts.className='fts';ts.textContent=fmtTime();
  var fw=document.createElement('span');fw.className='fw';fw.style.color=color;fw.textContent=msg[0];
  var arr=document.createElement('span');arr.textContent=' \u2192 ';arr.style.color='#3b1280';
  var to=document.createElement('span');to.style.color='#6d28d9';to.textContent=msg[1]+': ';
  var ft=document.createElement('span');ft.className='ft';ft.textContent=msg[2];
  item.appendChild(ts);item.appendChild(fw);item.appendChild(arr);item.appendChild(to);item.appendChild(ft);
  feedList.insertBefore(item,feedList.firstChild);
  while(feedList.children.length>35)feedList.removeChild(feedList.lastChild);
  if(fromAg){fromAg.pulse=1;spawnBubble(fromAg,msg[2]);}
  if(fromAg&&toAg){
    totalBeams++;
    beams.push({fx:fromAg.gx,fy:fromAg.gy,tx2:toAg.gx,ty2:toAg.gy,color:color,life:90,maxLife:90});
    // Particle burst at sender
    var sp=toS(fromAg.gx,fromAg.gy);
    var ps=[];for(var pi=0;pi<8;pi++)ps.push({x:sp.sx,y:sp.sy-20,vx:(Math.random()-0.5)*3,vy:-Math.random()*2-1,r:1.5+Math.random()*1.5});
    explosions.push({particles:ps,color:color,life:30,maxLife:30});
  }
}

function spawnBubble(ag,text){bubbles.push({ag:ag,text:text,life:220,maxLife:220});}

// ─── Agent list sidebar ──────────────────────────────────────────
var alist=document.getElementById('agent-list'),aRowEls=[];
agents.forEach(function(ag){
  var row=document.createElement('div');row.className='ar';
  var dot=document.createElement('div');dot.className='ad';dot.style.background=ag.color;
  var nm=document.createElement('span');nm.className='an';nm.textContent=ag.name;
  var rl=document.createElement('span');rl.style.color='#3b1280';rl.style.fontSize='8px';rl.textContent=ag.role;
  var st=document.createElement('span');st.className='ab';
  row.appendChild(dot);row.appendChild(nm);row.appendChild(rl);row.appendChild(st);
  alist.appendChild(row);aRowEls.push({st:st,ag:ag});
});

// ─── Tooltip ────────────────────────────────────────────────────
var tooltip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',function(e){
  var rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,found=null;
  for(var i=0;i<agents.length;i++){var dx=mx-agents[i].px,dy=my-agents[i].py;if(Math.sqrt(dx*dx+dy*dy)<22){found=agents[i];break;}}
  if(found){document.getElementById('tt-n').textContent=found.name;document.getElementById('tt-r').textContent=found.role;var ttBeh=found.chatPause>0?'chatting':found.beh;document.getElementById('tt-b').textContent=ttBeh+(found.sitting||found.chatPause>0?' — stationary':' — moving');tooltip.style.left=(e.clientX-rect.left+16)+'px';tooltip.style.top=(e.clientY-rect.top-14)+'px';tooltip.style.display='block';}
  else tooltip.style.display='none';
});
canvas.addEventListener('mouseleave',function(){tooltip.style.display='none';});

// ─── HUD updates ────────────────────────────────────────────────
var statusMsgs=[['PIPELINE: NOMINAL','PIPELINE: 3 WARM LEADS'],['MEMORY: SYNCED','MEMORY: SYNCING...'],['SECURITY: CLEAR','SECURITY: SCAN RUNNING'],['LLM ROUTER: ONLINE','LLM: GEMINI ACTIVE']];
var statusIdx=[0,0,0,0];
var alEls=[document.getElementById('al1'),document.getElementById('al2'),document.getElementById('al3'),document.getElementById('al4')];
function updateHUD(){
  var now=new Date(),h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clock').textContent=h+':'+('0'+m).slice(-2)+':'+('0'+s).slice(-2)+' '+ap+' ET';
  var elapsed=Math.floor((Date.now()-startTime)/1000),em=Math.floor(elapsed/60),es=elapsed%60;
  document.getElementById('sv-up').textContent=('0'+em).slice(-2)+':'+('0'+es).slice(-2);
  document.getElementById('sv-msgs').textContent=totalMsgs;
  document.getElementById('sv-beams').textContent=totalBeams;
  document.getElementById('sv-tasks').textContent=totalTasks;
  document.getElementById('sv-active').textContent=agents.filter(function(a){return a.sitting&&a.beh==='working';}).length;
  document.getElementById('m0').textContent=totalMsgs;
  document.getElementById('m1').textContent=totalMeets;
  document.getElementById('m2').textContent=totalBrews;
  document.getElementById('m3').textContent=totalTasks;
  // Rotate alert messages
  if(Math.random()<0.03){var ri=Math.floor(Math.random()*4);statusIdx[ri]=(statusIdx[ri]+1)%statusMsgs[ri].length;alEls[ri].textContent=statusMsgs[ri][statusIdx[ri]];}
  // Agent list
  var behColor={working:'#60a5fa',caffeinating:'#fb923c',hydrating:'#38bdf8',visiting:'#a78bfa',wandering:'#3b1280',idle:'#1a0840',chatting:'#f472b6'};
  aRowEls.forEach(function(r){var b=r.ag.chatPause>0?'chatting':r.ag.beh;r.st.textContent=b;r.st.style.color=behColor[b]||'#3b1280';});
}

// ─── Init + loop ────────────────────────────────────────────────
agents.forEach(function(ag,i){ag.timer=20+i*14;});
[300,700,1100,1500,2000,2600,3300].forEach(function(t){setTimeout(pushFeed,t);});

var lastFeed=0,lastHUD=0,lastMM=0,lastGraph=0;
function loop(ts){
  frame++;
  agents.forEach(updateAgent);
  drawScene();
  if(ts-lastFeed>900){pushFeed();lastFeed=ts;}
  if(ts-lastHUD>400){updateHUD();lastHUD=ts;}
  if(ts-lastMM>80){drawMinimap();lastMM=ts;}
  if(ts-lastGraph>200){drawGraph();lastGraph=ts;}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
