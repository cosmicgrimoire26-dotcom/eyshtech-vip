<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eysh's shop</title>
  <meta name="description" content="Things I love, now yours." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0a0a0a;
      --text:   #f0ead8;
      --muted:  #8a8498;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    a.shop-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: transparent;
      border: 1px solid var(--text);
      color: var(--text);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 200ms ease;
    }
    a.shop-btn:hover {
      background: var(--text);
      color: var(--bg);
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      margin: 0 0.5rem;
    }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <h1>Eysh's shop</h1>
  <p class="subtitle">things I love, now yours</p>
  <a href="https://eyshtech.myshopify.com" class="shop-btn">Shop Now</a>

  <footer>
    <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a>
  </footer>
</body>
</html>
